name: predictive-maintenance-engine

on:
  push:
    branches: [main]

jobs:
  build-train-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Dependencies
        run: pip install -r predictive-maintenance-engine/requirements.txt

      - name: Upload Dataset to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # The '|| true' statement prevents your entire build from failing if HF rate limits you again
        run: python predictive-maintenance-engine/model_building/data_register.py || true

      - name: Run Data Preparation
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python predictive-maintenance-engine/model_building/prep.py

      - name: Model Building
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python predictive-maintenance-engine/model_building/train.py

      - name: Push files to Frontend Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python predictive-maintenance-engine/hosting/hosting.py
